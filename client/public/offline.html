<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Offline — Blink</title>
    <style>
      /* Deliberately self-contained. An offline page that needs to fetch a
         stylesheet to render is not an offline page. */
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        background: #fafaf9;
        color: #0a0a0a;
        font-family:
          Inter,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          sans-serif;
        text-align: center;
      }
      .card {
        max-width: 22rem;
      }
      img {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        margin-bottom: 1.25rem;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.25rem;
        font-weight: 600;
      }
      p {
        margin: 0 0 1.5rem;
        font-size: 0.875rem;
        line-height: 1.6;
        color: #78716c;
      }
      button {
        height: 2.75rem;
        padding: 0 1.5rem;
        border: 0;
        border-radius: 0.75rem;
        background: #0a0a0a;
        color: #fff;
        font-family: inherit;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="/icons/icon-192.png" alt="" />
      <h1>You&rsquo;re offline</h1>
      <p>
        Blink needs a connection to send and receive messages. Your chats are safe &mdash;
        they&rsquo;ll be here when you&rsquo;re back.
      </p>
      <button onclick="location.reload()">Try again</button>
    </div>

    <script>
      // Reload the moment the connection returns, so nobody is left staring at
      // this page after their train comes out of the tunnel.
      window.addEventListener('online', () => location.reload());
    </script>
  </body>
</html>
